<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPad Dark Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PDF.js 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <style>
        @font-face { font-family: 'Pretendard-Regular'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); font-weight: 400; font-style: normal; }
        @font-face { font-family: 'Pretendard-Bold'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff'); font-weight: 700; font-style: normal; }
        @font-face { font-family: 'Pretendard-Black'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Black.woff') format('woff'); font-weight: 900; font-style: normal; }
        
        body { 
            font-family: 'Pretendard-Regular', sans-serif; 
            background-color: #000000; 
            overscroll-behavior: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .font-black { font-family: 'Pretendard-Black', sans-serif; }
        .font-bold { font-family: 'Pretendard-Bold', sans-serif; }

        /* 필기 시 화면 밀림 방지 */
        #canvas-screen, #canvas-wrapper { touch-action: none; overscroll-behavior: none; }

        /* 알약 툴바 내 버튼 요소 */
        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8E8E93;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tool-btn.active {
            background-color: #3b82f6; 
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .tool-btn:active { transform: scale(0.92); }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn.active {
            transform: scale(1.2);
            border-color: white;
            box-shadow: 0 0 8px rgba(255,255,255,0.4);
        }

        /* 굵기 조절 슬라이더 */
        input[type=range] { -webkit-appearance: none; width: 100px; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #ffffff; cursor: pointer; margin-top: -6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #3A3A3C; border-radius: 2px; }

        .doc-thumb { position: relative; border-radius: 8px; overflow: hidden; background: white; }
        .doc-thumb::before {
            content: ''; position: absolute; top: 0; left: 0;
            border-width: 14px; border-style: solid;
            border-color: #000000 #f1f5f9 #f1f5f9 #000000; 
            border-bottom-right-radius: 6px;
            z-index: 10;
        }
    </style>
</head>
<body class="w-full h-[100dvh] overflow-hidden flex flex-col">

    <!-- ========================================== -->
    <!-- 화면 1: 문서 목록 화면 (홈 화면) -->
    <!-- ========================================== -->
    <div id="document-list-screen" class="w-full h-full overflow-y-auto bg-black text-white flex flex-col z-10 relative">
        <div class="px-6 md:px-10 pt-10 pb-6 flex justify-between items-end">
            <h1 class="text-4xl font-bold text-white">문서</h1>
            
            <div class="relative">
                <button onclick="toggleNewMenu()" class="bg-[#3b82f6] text-white px-4 py-1.5 rounded-full flex items-center gap-1.5 font-bold text-[14px] active:scale-95 transition-transform shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <i class="fa-solid fa-plus text-sm"></i> 신규
                </button>
                
                <!-- 신규 드롭다운 메뉴 -->
                <div id="new-menu" class="absolute right-0 mt-2 w-44 bg-[#1C1C1E] border border-white/10 rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.8)] overflow-hidden hidden z-50 origin-top-right transition-all">
                    <button onclick="startBlankMemo()" class="w-full text-left px-4 py-3.5 text-[14px] font-bold text-white hover:bg-white/10 active:bg-white/20 transition-colors border-b border-white/5 flex items-center gap-2.5">
                        <i class="fa-regular fa-pen-to-square text-[#3b82f6]"></i>메모만 하기
                    </button>
                    <button onclick="document.getElementById('file-upload-home').click()" class="w-full text-left px-4 py-3.5 text-[14px] font-bold text-white hover:bg-white/10 active:bg-white/20 transition-colors flex items-center gap-2.5">
                        <i class="fa-regular fa-file-pdf text-[#3b82f6]"></i>문서 불러오기
                    </button>
                </div>
            </div>
        </div>
        <input type="file" id="file-upload-home" accept=".pdf, .ppt, .pptx, image/*" class="hidden" onchange="importFile(event)">

        <div id="document-grid" class="px-6 md:px-10 pb-20 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-5 gap-y-8">
            <!-- 자바스크립트로 렌더링됩니다 -->
        </div>
    </div>

    <!-- ========================================== -->
    <!-- 화면 2: 캔버스 필기 화면 -->
    <!-- ========================================== -->
    <div id="canvas-screen" class="fixed inset-0 w-full h-full hidden z-50 bg-[#0a0a0a] flex-col">
        
        <!-- 알약 모양(Pill-shape) 플로팅 툴바 -->
        <div class="absolute top-4 left-1/2 -translate-x-1/2 z-50 flex items-center bg-[#1C1C1E]/95 backdrop-blur-xl border border-white/10 rounded-full px-2 py-1.5 shadow-[0_10px_30px_rgba(0,0,0,0.8)] max-w-[95%] overflow-visible scrollbar-hide">
            
            <button onclick="closeCanvas()" class="w-10 h-10 rounded-full flex items-center justify-center text-[#3b82f6] hover:bg-white/10 active:scale-95 shrink-0" title="홈으로">
                <i class="fa-solid fa-house text-[15px]"></i>
            </button>
            
            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 펜/지우개 -->
            <div class="flex items-center bg-black/50 rounded-full p-1 border border-white/5 shrink-0 gap-1 relative">
                <div class="tool-btn active w-9 h-9" id="tool-pen" onclick="setTool('pen')">
                    <i class="fa-solid fa-pen text-[14px]"></i>
                </div>
                <div class="tool-btn w-9 h-9 relative" id="tool-eraser" onclick="handleEraserClick()">
                    <i class="fa-solid fa-eraser text-[14px]"></i>
                </div>

                <!-- 지우개 하위 메뉴 (드롭다운) -->
                <div id="eraser-menu" class="absolute top-14 left-1/2 -translate-x-1/2 bg-[#2C2C2E] border border-white/10 rounded-2xl shadow-2xl overflow-hidden hidden flex-col w-36 z-[60]">
                    <button onclick="setEraserMode('free')" id="btn-eraser-free" class="w-full text-left px-4 py-3 text-[14px] font-bold text-[#3b82f6] hover:bg-white/10 flex items-center gap-2.5 border-b border-white/5"><i class="fa-solid fa-eraser w-4"></i>자유 지우개</button>
                    <button onclick="setEraserMode('stroke')" id="btn-eraser-stroke" class="w-full text-left px-4 py-3 text-[14px] font-bold text-white hover:bg-white/10 flex items-center gap-2.5 border-b border-white/5"><i class="fa-solid fa-burst w-4"></i>획 지우개</button>
                    <button onclick="clearCanvasConfirm()" class="w-full text-left px-4 py-3 text-[14px] font-bold text-red-500 hover:bg-white/10 flex items-center gap-2.5"><i class="fa-regular fa-trash-can w-4"></i>모두 지우기</button>
                </div>
            </div>

            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 손필기 / 펜슬 전용 토글 -->
            <button onclick="toggleFingerDrawing()" id="btn-finger-toggle" class="w-10 h-10 rounded-full flex items-center justify-center text-[#3b82f6] bg-white/5 hover:bg-white/10 active:scale-95 shrink-0 transition-colors relative group" title="터치/펜슬 모드 변경">
                <i id="finger-icon" class="fa-solid fa-pen-nib text-[16px]"></i>
                <!-- 툴팁 -->
                <span class="absolute -bottom-8 bg-black text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">펜슬 전용 모드</span>
            </button>

            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 색상 팔레트 -->
            <div class="flex items-center gap-3 px-2 shrink-0" id="color-palette">
                <div class="color-btn active" style="background-color: #FFFFFF;" onclick="setColor('#FFFFFF', this)"></div>
                <div class="color-btn" style="background-color: #3b82f6;" onclick="setColor('#3b82f6', this)"></div>
                <div class="color-btn" style="background-color: #FF3B30;" onclick="setColor('#FF3B30', this)"></div>
                <div class="color-btn" style="background-color: #34C759;" onclick="setColor('#34C759', this)"></div>
                <!-- 커스텀 색상 선택기 -->
                <div class="color-btn relative overflow-hidden flex items-center justify-center" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);" title="사용자 지정 색상">
                    <input type="color" id="custom-color-picker" class="absolute inset-0 w-[200%] h-[200%] -top-1/2 -left-1/2 opacity-0 cursor-pointer" onchange="setCustomColor(this.value, this.parentElement)">
                </div>
            </div>

            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 선 굵기 -->
            <div class="flex items-center gap-2 px-2 shrink-0">
                <i class="fa-solid fa-circle text-[6px] text-gray-500"></i>
                <input type="range" id="line-width" min="1" max="30" value="4" oninput="setLineWidth(this.value)">
                <i class="fa-solid fa-circle text-[12px] text-gray-500"></i>
            </div>

            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 언두 리두 -->
            <button onclick="undo()" id="btn-undo" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:bg-white/10 disabled:opacity-30 active:scale-95 shrink-0"><i class="fa-solid fa-rotate-left"></i></button>
            <button onclick="redo()" id="btn-redo" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:bg-white/10 disabled:opacity-30 active:scale-95 shrink-0"><i class="fa-solid fa-rotate-right"></i></button>

            <div class="w-px h-6 bg-white/10 mx-2 shrink-0"></div>

            <!-- 문서 열기, 저장 -->
            <button onclick="document.getElementById('file-upload-home').click()" class="w-10 h-10 rounded-full flex items-center justify-center text-[#3b82f6] hover:bg-white/10 active:scale-95 shrink-0" title="문서/이미지 열기">
                <i class="fa-regular fa-file-pdf text-[18px]"></i>
            </button>
            <button onclick="saveNote()" class="w-10 h-10 rounded-full flex items-center justify-center text-[#3b82f6] hover:bg-white/10 active:scale-95 shrink-0" title="이미지로 저장">
                <i class="fa-solid fa-download text-[17px]"></i>
            </button>
        </div>

        <!-- PDF 페이지 네비게이션 컨트롤러 -->
        <div id="pdf-controls" class="absolute top-4 right-4 z-50 bg-[#1C1C1E]/95 backdrop-blur-xl border border-white/10 rounded-full px-5 py-2 hidden items-center gap-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <button onclick="prevPage()" class="text-gray-400 hover:text-[#3b82f6] active:scale-95 transition-colors"><i class="fa-solid fa-chevron-left text-lg"></i></button>
            <span class="text-[14px] font-black text-white tracking-widest"><span id="page-num">1</span> / <span id="page-count">1</span></span>
            <button onclick="nextPage()" class="text-gray-400 hover:text-[#3b82f6] active:scale-95 transition-colors"><i class="fa-solid fa-chevron-right text-lg"></i></button>
        </div>

        <!-- 캔버스 컨테이너 (레이어 분리 적용) -->
        <div id="canvas-wrapper" class="flex-1 relative w-full h-full bg-[#0a0a0a] overflow-hidden flex items-center justify-center">
            <!-- 배경 레이어 (PDF/이미지 렌더링 영역 - 절대 안 지워짐) -->
            <canvas id="bg-board" class="absolute z-0 pointer-events-none shadow-2xl"></canvas>
            <!-- 드로잉 레이어 (필기 및 지우개 영역) -->
            <canvas id="drawing-board" class="absolute z-10 touch-none"></canvas>
        </div>

        <!-- 전체 지우기 모달 -->
        <div id="clear-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
            <div class="bg-[#1C1C1E] border border-white/10 rounded-3xl p-6 w-[90%] max-w-[320px] flex flex-col items-center shadow-2xl transform scale-95 transition-transform duration-300" id="clear-modal-content">
                <div class="w-14 h-14 rounded-full bg-red-500/20 flex items-center justify-center mb-4">
                    <i class="fa-regular fa-trash-can text-2xl text-red-500"></i>
                </div>
                <h3 class="text-[18px] font-black text-white mb-2">필기 전체 삭제</h3>
                <p class="text-[14px] text-gray-400 text-center mb-6">캔버스(현재 페이지)의 필기 내용이 모두 지워집니다.<br>계속하시겠습니까?</p>
                <div class="flex gap-3 w-full">
                    <button onclick="closeClearModal()" class="flex-1 py-3 rounded-xl bg-[#2A2A2C] text-white font-bold text-[15px] active:scale-95 transition-transform">취소</button>
                    <button onclick="clearCanvas()" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-[15px] active:scale-95 transition-transform">모두 지우기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 알림 토스트 -->
    <div id="toast-msg" class="fixed top-24 left-1/2 -translate-x-1/2 bg-white text-[#0a0a0a] px-6 py-3 rounded-full text-[14px] font-black shadow-[0_10px_30px_rgba(0,0,0,0.5)] z-[150] transition-all duration-300 opacity-0 transform -translate-y-4 pointer-events-none">
        알림 메시지
    </div>

    <script>
        // ==========================================
        // 1. 문서 목록 홈 화면 로직
        // ==========================================
        const mockDocuments = [];

        function renderDocuments() {
            const grid = document.getElementById('document-grid');
            if (!grid) return; 
            let html = '';
            mockDocuments.forEach(doc => { /* ... 생략 ... */ });
            grid.innerHTML = html;
        }

        function toggleNewMenu() {
            document.getElementById('new-menu').classList.toggle('hidden');
        }

        window.addEventListener('click', function(e) {
            const btn = document.querySelector('button[onclick="toggleNewMenu()"]');
            const menu = document.getElementById('new-menu');
            if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
            
            // 지우개 메뉴 닫기 처리
            const eraserBtn = document.getElementById('tool-eraser');
            const eraserMenu = document.getElementById('eraser-menu');
            if (eraserBtn && eraserMenu && !eraserBtn.contains(e.target) && !eraserMenu.contains(e.target)) {
                eraserMenu.classList.add('hidden');
            }
        });

        // ==========================================
        // 2. 캔버스 및 레이어 엔진
        // ==========================================
        const bgCanvas = document.getElementById('bg-board');
        const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
        
        const canvas = document.getElementById('drawing-board');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let isDrawing = false;
        let currentTool = 'pen';
        let eraserMode = 'free'; // 'free' or 'stroke'
        let currentColor = '#FFFFFF';
        let currentLineWidth = 4;
        let lastX = 0, lastY = 0;
        let allowFingerDrawing = false; // 기본값: false (애플펜슬 전용 모드)

        // PDF 페이지네이션 데이터
        let pdfDoc = null;
        let pageNum = 1;
        let pageIsRendering = false;
        let pageNumPending = null;
        let pageDrawings = {}; // { pageNum: dataURL }

        // 히스토리 관리 (현재 페이지 기준)
        let history = [];
        let historyStep = -1;
        const maxHistory = 30;

        function showToast(msg) {
            let toast = document.getElementById('toast-msg');
            toast.innerText = msg; 
            toast.classList.remove('opacity-0', '-translate-y-4'); 
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { 
                toast.classList.remove('opacity-100', 'translate-y-0'); 
                toast.classList.add('opacity-0', '-translate-y-4'); 
            }, 2000);
        }

        // 캔버스 초기화 시 로컬 스토리지에 저장된 메모 불러오기
        function initCanvasData() {
            const savedNote = localStorage.getItem('savedDeviceNote');
            if (savedNote) {
                history = [savedNote];
                historyStep = 0;
                restoreState();
                showToast('이전 필기를 자동으로 불러왔습니다.');
            } else {
                saveState();
            }
        }

        // ==========================================
        // 3. 파일 불러오기 & PDF 페이지네이션
        // ==========================================
        function startBlankMemo() {
            document.getElementById('new-menu').classList.add('hidden');
            pdfDoc = null;
            document.getElementById('pdf-controls').classList.add('hidden');
            openCanvas(true);
        }

        function importFile(e) {
            document.getElementById('new-menu').classList.add('hidden');
            const file = e.target.files[0];
            if (!file) return;

            const fileExt = file.name.split('.').pop().toLowerCase();

            if (file.type === 'application/pdf' || fileExt === 'pdf') {
                showToast('PDF 문서를 로드하고 있습니다...');
                openCanvas(false); 
                const reader = new FileReader();
                reader.onload = function(event) {
                    const typedarray = new Uint8Array(event.target.result);
                    pdfjsLib.getDocument(typedarray).promise.then(pdf => {
                        pdfDoc = pdf;
                        document.getElementById('page-count').textContent = pdf.numPages;
                        document.getElementById('pdf-controls').classList.remove('hidden');
                        document.getElementById('pdf-controls').classList.add('flex');
                        
                        pageNum = 1;
                        pageDrawings = {}; // 새 문서 열때 필기 초기화
                        history = []; historyStep = -1;
                        renderPage(pageNum);
                    }).catch(err => {
                        showToast('PDF를 읽는 데 실패했습니다.');
                        console.error(err);
                    });
                };
                reader.readAsArrayBuffer(file);
            } 
            else if (fileExt === 'ppt' || fileExt === 'pptx') {
                showToast('PPT 렌더링은 브라우저 단독으로 불가합니다. PDF로 변환 후 열어주세요.');
                document.getElementById('file-upload-home').value = '';
            } 
            else if (file.type.startsWith('image/')) {
                openCanvas(false);
                pdfDoc = null;
                document.getElementById('pdf-controls').classList.add('hidden');
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        setTimeout(() => {
                            fitCanvasToContent(img.width, img.height);
                            bgCtx.drawImage(img, 0, 0, bgCanvas.width, bgCanvas.height);
                            saveState();
                            showToast('이미지를 성공적으로 불러왔습니다.');
                            document.getElementById('file-upload-home').value = '';
                        }, 100); 
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                showToast('지원하지 않는 파일 형식입니다. (PDF 또는 이미지 권장)');
            }
        }

        function renderPage(num) {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({ scale: 2.0 }); // 고해상도 렌더링
                fitCanvasToContent(viewport.width, viewport.height);
                
                const renderContext = {
                    canvasContext: bgCtx,
                    viewport: viewport
                };
                
                page.render(renderContext).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                    
                    // 현재 페이지 필기 데이터 복구
                    restorePageDrawing(num);
                    document.getElementById('file-upload-home').value = '';
                });
            });
            document.getElementById('page-num').textContent = num;
        }

        function queueRenderPage(num) {
            if (pageIsRendering) { pageNumPending = num; } 
            else { renderPage(num); }
        }

        function prevPage() {
            if (!pdfDoc || pageNum <= 1) return;
            saveCurrentPageDrawing(); // 넘기기 전 저장
            pageNum--;
            queueRenderPage(pageNum);
        }

        function nextPage() {
            if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
            saveCurrentPageDrawing(); // 넘기기 전 저장
            pageNum++;
            queueRenderPage(pageNum);
        }

        function saveCurrentPageDrawing() {
            pageDrawings[pageNum] = {
                history: [...history],
                historyStep: historyStep,
                dataURL: canvas.toDataURL() // 드로잉 레이어만 저장
            };
        }

        function restorePageDrawing(num) {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 드로잉 초기화
            if (pageDrawings[num]) {
                history = [...pageDrawings[num].history];
                historyStep = pageDrawings[num].historyStep;
                const img = new Image();
                img.src = pageDrawings[num].dataURL;
                img.onload = () => { ctx.drawImage(img, 0, 0); };
            } else {
                history = []; historyStep = -1;
                saveState(); // 빈 상태 저장
            }
            updateUndoRedoButtons();
        }

        // ==========================================
        // 4. 캔버스 사이즈 및 UI 도구 설정
        // ==========================================
        function fitCanvasToContent(contentWidth, contentHeight) {
            const wrapper = document.getElementById('canvas-wrapper');
            const scale = Math.min((wrapper.clientWidth - 40) / contentWidth, (wrapper.clientHeight - 40) / contentHeight);
            
            const finalWidth = contentWidth * scale;
            const finalHeight = contentHeight * scale;

            // 해상도 대응
            const dpr = window.devicePixelRatio || 1;
            
            [bgCanvas, canvas].forEach(c => {
                c.width = finalWidth * dpr;
                c.height = finalHeight * dpr;
                c.style.width = finalWidth + 'px';
                c.style.height = finalHeight + 'px';
                const context = c.getContext('2d');
                context.scale(dpr, dpr);
                context.lineCap = 'round';
                context.lineJoin = 'round';
            });
            
            bgCtx.fillStyle = '#FFFFFF'; // PDF 배경은 하얗게
            bgCtx.fillRect(0, 0, finalWidth, finalHeight);
        }

        function resizeCanvas(isBlank = false) {
            if(document.getElementById('canvas-screen').classList.contains('hidden')) return;
            
            // 빈 메모일 경우에만 전체화면 리사이징 (PDF/이미지는 fitCanvasToContent 사용)
            if (isBlank || !pdfDoc) {
                const wrapper = document.getElementById('canvas-wrapper');
                const dpr = window.devicePixelRatio || 1;
                
                [bgCanvas, canvas].forEach(c => {
                    const temp = c === canvas && historyStep >= 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
                    
                    c.width = wrapper.clientWidth * dpr;
                    c.height = wrapper.clientHeight * dpr;
                    c.style.width = wrapper.clientWidth + 'px';
                    c.style.height = wrapper.clientHeight + 'px';
                    const context = c.getContext('2d');
                    context.scale(dpr, dpr);
                    context.lineCap = 'round';
                    context.lineJoin = 'round';

                    if (c === bgCanvas) {
                        context.fillStyle = '#0a0a0a';
                        context.fillRect(0, 0, wrapper.clientWidth, wrapper.clientHeight);
                    } else if (temp) {
                        context.putImageData(temp, 0, 0);
                    }
                });
            }
        }

        function handleEraserClick() {
            if (currentTool === 'eraser') {
                // 이미 지우개 선택 중이면 메뉴 열기
                document.getElementById('eraser-menu').classList.toggle('hidden');
            } else {
                setTool('eraser');
            }
        }

        function setEraserMode(mode) {
            eraserMode = mode;
            document.getElementById('eraser-menu').classList.add('hidden');
            document.getElementById('btn-eraser-free').classList.remove('text-[#3b82f6]');
            document.getElementById('btn-eraser-free').classList.add('text-white');
            document.getElementById('btn-eraser-stroke').classList.remove('text-[#3b82f6]');
            document.getElementById('btn-eraser-stroke').classList.add('text-white');
            
            document.getElementById(`btn-eraser-${mode}`).classList.remove('text-white');
            document.getElementById(`btn-eraser-${mode}`).classList.add('text-[#3b82f6]');
            showToast(mode === 'free' ? '자유 지우개가 선택되었습니다.' : '스마트 획 지우개가 선택되었습니다.');
        }

        function setTool(tool) {
            currentTool = tool;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            document.getElementById(`tool-${tool}`).classList.add('active');
            
            if(tool === 'pen') {
                ctx.globalCompositeOperation = 'source-over';
            } else if (tool === 'eraser' && eraserMode === 'free') {
                ctx.globalCompositeOperation = 'destination-out';
                currentLineWidth = 20; // 자유 지우개 기본 크기
                document.getElementById('line-width').value = 20;
            }
        }

        function setColor(color, element) {
            currentTool = 'pen';
            currentColor = color;
            ctx.globalCompositeOperation = 'source-over';
            
            document.getElementById('tool-eraser').classList.remove('active');
            document.getElementById('tool-pen').classList.add('active');
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        function setCustomColor(color, element) {
            setColor(color, element);
            // 선택된 색상으로 그라데이션 버튼 색상을 고정시켜 사용자 피드백 제공 (선택사항)
        }

        function setLineWidth(width) { currentLineWidth = width; }

        function toggleFingerDrawing() {
            allowFingerDrawing = !allowFingerDrawing;
            const btn = document.getElementById('btn-finger-toggle');
            const icon = document.getElementById('finger-icon');
            
            if (allowFingerDrawing) {
                // 터치 허용 (손가락 모드)
                btn.classList.add('text-[#3b82f6]', 'bg-white/10');
                btn.classList.remove('text-gray-400', 'bg-white/5');
                icon.className = 'fa-solid fa-hand-pointer text-[16px]';
                showToast('터치 및 펜슬 필기가 모두 허용됩니다.');
            } else {
                // 애플펜슬 전용 (팜 리젝션)
                btn.classList.remove('text-[#3b82f6]', 'bg-white/10');
                btn.classList.add('text-gray-400', 'bg-white/5');
                icon.className = 'fa-solid fa-pen-nib text-[16px]';
                showToast('애플 펜슬 및 마우스 전용 모드 (팜 리젝션 활성화)');
            }
        }

        // ==========================================
        // 5. 드로잉 이벤트 & 스마트 획 지우개
        // ==========================================
        
        // 획 지우개용 반복적 Flood Fill (재귀 X -> Stack Overflow 방지)
        function eraseStroke(startX, startY) {
            const dpr = window.devicePixelRatio || 1;
            const x = Math.floor(startX * dpr);
            const y = Math.floor(startY * dpr);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const w = canvas.width;
            const h = canvas.height;
            
            // 클릭 지점 근처의 불투명한 픽셀 찾기 (정확한 클릭 보정)
            let targetX = x, targetY = y;
            let found = false;
            const radius = Math.floor(10 * dpr);
            for(let dy = -radius; dy <= radius; dy++){
                for(let dx = -radius; dx <= radius; dx++){
                    let ny = y + dy, nx = x + dx;
                    if(ny >= 0 && ny < h && nx >= 0 && nx < w) {
                        if(data[(ny * w + nx) * 4 + 3] > 0) {
                            targetX = nx; targetY = ny; found = true; break;
                        }
                    }
                }
                if(found) break;
            }
            if(!found) return; // 그릴 선이 없음

            // Iterative Flood Fill
            const pixelStack = [targetY * w + targetX];
            while(pixelStack.length > 0) {
                let pos = pixelStack.pop();
                let idx = pos * 4;
                
                if (data[idx + 3] === 0) continue;
                
                // 해당 픽셀 투명화
                data[idx + 3] = 0;
                data[idx] = 0; data[idx+1] = 0; data[idx+2] = 0;
                
                let px = pos % w;
                let py = Math.floor(pos / w);
                
                if (px > 0) pixelStack.push(pos - 1);
                if (px < w - 1) pixelStack.push(pos + 1);
                if (py > 0) pixelStack.push(pos - w);
                if (py < h - 1) pixelStack.push(pos + w);
            }
            ctx.putImageData(imgData, 0, 0);
            saveState(); // 지운 후 상태 저장
        }

        function startDrawing(e) {
            if (e.pointerType === 'touch' && !allowFingerDrawing) return;
            e.preventDefault(); 
            
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left; lastY = e.clientY - rect.top;

            if (currentTool === 'eraser' && eraserMode === 'stroke') {
                // 획 지우개 모드
                eraseStroke(lastX, lastY);
                isDrawing = false;
            } else {
                // 일반 그리기 / 자유 지우개
                isDrawing = true;
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
                
                ctx.beginPath();
                ctx.arc(lastX, lastY, currentLineWidth / 2, 0, Math.PI * 2);
                ctx.fillStyle = currentColor; // destination-out에서는 색상 무관
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            if (e.pointerType === 'touch' && !allowFingerDrawing) return;
            e.preventDefault(); 
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;

            ctx.lineWidth = currentLineWidth;
            ctx.strokeStyle = currentColor;
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x; lastY = y;
        }

        function stopDrawing(e) {
            if (isDrawing) {
                e.preventDefault();
                isDrawing = false;
                ctx.closePath();
                saveState();
            }
        }

        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);
        canvas.addEventListener('pointerout', stopDrawing);

        // ==========================================
        // 6. 히스토리, 초기화 및 저장
        // ==========================================
        function saveState() {
            historyStep++;
            if (historyStep < history.length) { history.length = historyStep; }
            const dataUrl = canvas.toDataURL();
            history.push(dataUrl);
            if (history.length > maxHistory) { history.shift(); historyStep--; }
            updateUndoRedoButtons();
            
            // 디바이스 로컬 저장
            try { localStorage.setItem('savedDeviceNote', dataUrl); } catch (err) {}
        }

        function undo() { 
            if (historyStep > 0) { 
                historyStep--; 
                restoreState(); 
            } 
        }
        function redo() { 
            if (historyStep < history.length - 1) { 
                historyStep++; 
                restoreState(); 
            } 
        }

        function restoreState() {
            const img = new Image();
            img.src = history[historyStep];
            img.onload = function () {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height); // 드로잉만 리셋
                ctx.drawImage(img, 0, 0);
                ctx.restore();
            };
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyStep <= 0;
            document.getElementById('btn-redo').disabled = historyStep >= history.length - 1;
        }

        function clearCanvasConfirm() {
            document.getElementById('eraser-menu').classList.add('hidden');
            const modal = document.getElementById('clear-modal');
            const content = document.getElementById('clear-modal-content');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        function closeClearModal() {
            const modal = document.getElementById('clear-modal');
            const content = document.getElementById('clear-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300);
        }

        function clearCanvas() {
            closeClearModal();
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height); // 문서(bg)는 보존하고 드로잉만 지움
            ctx.restore();
            saveState();
            localStorage.removeItem('savedDeviceNote');
            showToast('캔버스가 초기화되었습니다.');
        }

        function saveNote() {
            // 합성용 임시 캔버스 생성 (배경 + 드로잉 병합)
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            // 1. 배경 복사 (문서)
            tempCtx.drawImage(bgCanvas, 0, 0);
            // 2. 그 위에 드로잉 복사
            tempCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = `Note_${new Date().getTime()}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
            showToast('노트가 갤러리에 저장되었습니다.');
        }

        function openCanvas(isBlank = true) {
            document.getElementById('document-list-screen').classList.add('hidden');
            document.getElementById('canvas-screen').classList.remove('hidden');
            document.getElementById('canvas-screen').classList.add('flex');
            setTimeout(() => {
                resizeCanvas(isBlank);
                if(isBlank && historyStep === -1) initCanvasData();
            }, 50);
        }

        function closeCanvas() {
            saveState(); 
            document.getElementById('canvas-screen').classList.add('hidden');
            document.getElementById('canvas-screen').classList.remove('flex');
            document.getElementById('document-list-screen').classList.remove('hidden');
        }

        window.addEventListener('resize', () => {
            if(window.innerWidth === canvas.width && window.innerHeight === canvas.height) return;
            // 빈 화면일때만 자동 리사이즈 (문서가 로드된 상태면 fitCanvasToContent로 고정됨)
            if(!pdfDoc) resizeCanvas(true);
        });
        
        window.onload = () => {
            renderDocuments();
        };
    </script>
</body>
</html>
