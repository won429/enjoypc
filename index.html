<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iPad Dark Notes</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face { font-family: 'Pretendard-Regular'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Regular.woff') format('woff'); font-weight: 400; font-style: normal; }
        @font-face { font-family: 'Pretendard-Bold'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Bold.woff') format('woff'); font-weight: 700; font-style: normal; }
        @font-face { font-family: 'Pretendard-Black'; src: url('https://cdn.jsdelivr.net/gh/Project-Noonnu/noonfonts_2107@1.1/Pretendard-Black.woff') format('woff'); font-weight: 900; font-style: normal; }
        
        body { 
            font-family: 'Pretendard-Regular', sans-serif; 
            background-color: #0a0a0a;
            /* 아이패드 제스처(새로고침, 스와이프 등) 방지 */
            overscroll-behavior: none; 
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .font-black { font-family: 'Pretendard-Black', sans-serif; }
        .font-bold { font-family: 'Pretendard-Bold', sans-serif; }

        /* 캔버스 영역 */
        #drawing-board {
            width: 100vw;
            height: 100vh;
            display: block;
            touch-action: none; /* 터치 스크롤 완벽 차단 */
        }

        /* 하단 툴바 UI 요소 */
        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8E8E93;
            transition: all 0.2s;
            cursor: pointer;
        }
        .tool-btn.active {
            background-color: #3b82f6; /* 포인트 블루 */
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .tool-btn:active {
            transform: scale(0.92);
        }

        /* 색상 팔레트 요소 */
        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .color-btn.active {
            transform: scale(1.15);
            border-color: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* 굵기 조절 슬라이더 커스텀 */
        input[type=range] {
            -webkit-appearance: none;
            width: 120px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #3A3A3C;
            border-radius: 2px;
        }
    </style>
</head>
<body class="fixed inset-0 overflow-hidden w-full h-full">
    
    <!-- 최상단 헤더 -->
    <header class="absolute top-0 left-0 right-0 p-4 md:p-6 flex justify-between items-start z-40 pointer-events-none">
        <div class="flex flex-col pointer-events-auto bg-[#1C1C1E]/80 backdrop-blur-md border border-white/5 px-5 py-3 rounded-2xl shadow-lg">
            <h1 class="text-[18px] font-black text-white tracking-tight leading-none mb-1">My Notes</h1>
            <span class="text-[11px] font-bold text-gray-500">2026.04.13</span>
        </div>
        
        <div class="flex gap-2 pointer-events-auto">
            <!-- 실행 취소 / 다시 실행 -->
            <div class="flex bg-[#1C1C1E]/80 backdrop-blur-md border border-white/5 rounded-full p-1 shadow-lg">
                <button onclick="undo()" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors active:scale-95 disabled:opacity-30" id="btn-undo">
                    <i class="fa-solid fa-rotate-left"></i>
                </button>
                <button onclick="redo()" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-400 hover:text-white hover:bg-white/10 transition-colors active:scale-95 disabled:opacity-30" id="btn-redo">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
            
            <!-- 저장 버튼 -->
            <button onclick="saveNote()" class="bg-[#1C1C1E]/80 backdrop-blur-md border border-white/5 px-4 h-12 rounded-full flex items-center justify-center gap-2 text-white font-bold text-[14px] hover:bg-white/10 transition-colors active:scale-95 shadow-lg">
                <i class="fa-solid fa-download"></i> 이미지 저장
            </button>
        </div>
    </header>

    <!-- 드로잉 캔버스 -->
    <canvas id="drawing-board"></canvas>

    <!-- 하단 플로팅 툴바 -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-50">
        <div class="bg-[#1C1C1E]/90 backdrop-blur-xl border border-white/10 shadow-[0_10px_40px_rgba(0,0,0,0.8)] rounded-full px-5 py-3 flex items-center gap-6">
            
            <!-- 도구 선택 (펜 / 지우개) -->
            <div class="flex gap-2 items-center bg-[#0a0a0a] p-1.5 rounded-full border border-white/5">
                <div class="tool-btn active" id="tool-pen" onclick="setTool('pen')">
                    <i class="fa-solid fa-pen text-[18px]"></i>
                </div>
                <div class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">
                    <i class="fa-solid fa-eraser text-[18px]"></i>
                </div>
            </div>

            <div class="w-px h-8 bg-gray-700/50"></div>

            <!-- 색상 팔레트 -->
            <div class="flex items-center gap-3" id="color-palette">
                <div class="color-btn active" style="background-color: #FFFFFF;" onclick="setColor('#FFFFFF', this)"></div>
                <div class="color-btn" style="background-color: #FF3B30;" onclick="setColor('#FF3B30', this)"></div>
                <div class="color-btn" style="background-color: #FF9500;" onclick="setColor('#FF9500', this)"></div>
                <div class="color-btn" style="background-color: #34C759;" onclick="setColor('#34C759', this)"></div>
                <div class="color-btn" style="background-color: #007AFF;" onclick="setColor('#007AFF', this)"></div>
            </div>

            <div class="w-px h-8 bg-gray-700/50"></div>

            <!-- 선 굵기 조절 -->
            <div class="flex items-center gap-3 px-2">
                <i class="fa-solid fa-circle text-[8px] text-gray-500"></i>
                <input type="range" id="line-width" min="1" max="30" value="4" oninput="setLineWidth(this.value)">
                <i class="fa-solid fa-circle text-[16px] text-gray-500"></i>
            </div>

            <div class="w-px h-8 bg-gray-700/50"></div>

            <!-- 전체 지우기 -->
            <button onclick="clearCanvasConfirm()" class="w-10 h-10 rounded-full flex items-center justify-center text-red-500 hover:bg-red-500/10 transition-colors active:scale-95">
                <i class="fa-regular fa-trash-can text-[18px]"></i>
            </button>
            
        </div>
    </div>

    <!-- 전체 지우기 확인 모달 -->
    <div id="clear-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="bg-[#1C1C1E] border border-white/10 rounded-3xl p-6 w-[90%] max-w-[320px] flex flex-col items-center shadow-2xl transform scale-95 transition-transform duration-300" id="clear-modal-content">
            <div class="w-14 h-14 rounded-full bg-red-500/20 flex items-center justify-center mb-4">
                <i class="fa-regular fa-trash-can text-2xl text-red-500"></i>
            </div>
            <h3 class="text-[18px] font-black text-white mb-2">필기 전체 삭제</h3>
            <p class="text-[14px] text-gray-400 text-center mb-6">캔버스의 모든 내용이 지워집니다.<br>계속하시겠습니까?</p>
            <div class="flex gap-3 w-full">
                <button onclick="closeClearModal()" class="flex-1 py-3 rounded-xl bg-[#2A2A2C] text-white font-bold text-[15px] active:scale-95 transition-transform">취소</button>
                <button onclick="clearCanvas()" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-[15px] active:scale-95 transition-transform">모두 지우기</button>
            </div>
        </div>
    </div>

    <!-- 알림 토스트 -->
    <div id="toast-msg" class="fixed top-24 left-1/2 -translate-x-1/2 bg-white text-[#0a0a0a] px-6 py-3 rounded-full text-[14px] font-black shadow-[0_10px_30px_rgba(0,0,0,0.5)] z-[100] transition-all duration-300 opacity-0 transform -translate-y-4 pointer-events-none">
        알림 메시지
    </div>

    <script>
        const canvas = document.getElementById('drawing-board');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let isDrawing = false;
        let currentTool = 'pen'; // 'pen' or 'eraser'
        let currentColor = '#FFFFFF';
        let currentLineWidth = 4;
        let lastX = 0;
        let lastY = 0;

        // Undo / Redo 기능용 배열
        let history = [];
        let historyStep = -1;
        const maxHistory = 30; // 메모리 방지를 위해 30번까지만 저장

        function showToast(msg) {
            let toast = document.getElementById('toast-msg');
            toast.innerText = msg; 
            toast.classList.remove('opacity-0', '-translate-y-4'); 
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => { 
                toast.classList.remove('opacity-100', 'translate-y-0'); 
                toast.classList.add('opacity-0', '-translate-y-4'); 
            }, 2000);
        }

        // 아이패드 Retina 디스플레이 및 리사이징 대응
        function resizeCanvas() {
            const tempState = ctx.getImageData(0, 0, canvas.width, canvas.height); // 기존 그림 임시 저장
            
            // 실제 디스플레이 픽셀 비율 대응
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            
            // CSS 사이즈는 100%로 고정
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            
            ctx.scale(dpr, dpr);
            
            // 배경색 채우기
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // 선 그리기 기본 설정
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 저장해둔 그림 복구 (리사이징 시)
            if(historyStep === -1) {
                saveState(); // 최초 빈 화면 저장
            } else {
                ctx.putImageData(tempState, 0, 0);
            }
        }

        // 도구 선택 로직 (펜/지우개)
        function setTool(tool) {
            currentTool = tool;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            document.getElementById(`tool-${tool}`).classList.add('active');
        }

        // 색상 선택 로직
        function setColor(color, element) {
            currentTool = 'pen'; // 색상을 고르면 자동으로 펜으로 변경
            currentColor = color;
            document.getElementById('tool-eraser').classList.remove('active');
            document.getElementById('tool-pen').classList.add('active');

            const colorBtns = document.querySelectorAll('.color-btn');
            colorBtns.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // 선 굵기 조절
        function setLineWidth(width) {
            currentLineWidth = width;
        }

        // 포인터 이벤트 핸들러 (마우스, 터치, 펜슬 모두 지원)
        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;

            // 점 하나만 찍을 때를 대비해 beginPath
            ctx.beginPath();
            ctx.arc(lastX, lastY, currentLineWidth / 2, 0, Math.PI * 2);
            ctx.fillStyle = currentTool === 'eraser' ? '#0a0a0a' : currentColor;
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); // 스크롤 등 기본 동작 방지

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = currentLineWidth;
            
            if (currentTool === 'eraser') {
                ctx.strokeStyle = '#0a0a0a'; // 배경색과 동일한 색으로 덮어씀
            } else {
                ctx.strokeStyle = currentColor;
            }

            ctx.lineTo(x, y);
            ctx.stroke();
            
            lastX = x;
            lastY = y;
        }

        function stopDrawing() {
            if (isDrawing) {
                isDrawing = false;
                ctx.closePath();
                saveState(); // 그림을 그린 후 상태 저장
            }
        }

        // 이벤트 리스너 등록 (Pointer Events 사용으로 터치/펜슬/마우스 통합 관리)
        canvas.addEventListener('pointerdown', startDrawing);
        canvas.addEventListener('pointermove', draw);
        canvas.addEventListener('pointerup', stopDrawing);
        canvas.addEventListener('pointercancel', stopDrawing);
        canvas.addEventListener('pointerout', stopDrawing);

        // 히스토리 관리 (Undo / Redo)
        function saveState() {
            historyStep++;
            // 이전 이후의 배열(redo할 미래 데이터)은 날려버림
            if (historyStep < history.length) {
                history.length = historyStep;
            }
            history.push(canvas.toDataURL());
            
            if (history.length > maxHistory) {
                history.shift();
                historyStep--;
            }
            updateUndoRedoButtons();
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                restoreState();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                restoreState();
            }
        }

        function restoreState() {
            const img = new Image();
            img.src = history[historyStep];
            img.onload = function () {
                // 스케일링 무시하고 덮어쓰기 위해 transform 잠시 해제
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                ctx.restore();
            };
            updateUndoRedoButtons();
        }

        function updateUndoRedoButtons() {
            document.getElementById('btn-undo').disabled = historyStep <= 0;
            document.getElementById('btn-redo').disabled = historyStep >= history.length - 1;
        }

        // 전체 지우기 모달 로직
        function clearCanvasConfirm() {
            const modal = document.getElementById('clear-modal');
            const content = document.getElementById('clear-modal-content');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeClearModal() {
            const modal = document.getElementById('clear-modal');
            const content = document.getElementById('clear-modal-content');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        function clearCanvas() {
            closeClearModal();
            
            // 현재 화면 전체를 배경색으로 다시 칠함
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            saveState();
            showToast('캔버스가 초기화되었습니다.');
        }

        // 이미지 저장 (갤러리 다운로드)
        function saveNote() {
            const link = document.createElement('a');
            link.download = `Note_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showToast('노트가 이미지로 저장되었습니다.');
        }

        // 초기화
        window.addEventListener('resize', () => {
            // 모바일 키보드 등으로 인한 불필요한 리사이징 방지
            if(window.innerWidth === canvas.width && window.innerHeight === canvas.height) return;
            resizeCanvas();
        });
        
        window.onload = () => {
            resizeCanvas();
            updateUndoRedoButtons();
        };
    </script>
</body>
</html>
